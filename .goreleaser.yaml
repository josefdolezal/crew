version: 2

project_name: crew

builds:
  - id: crew
    main: ./cmd/crew
    binary: crew
    ldflags: >-
      -s -w
      -X github.com/josefdolezal/crew/internal/version.Version={{ .Version }}
      -X github.com/josefdolezal/crew/internal/version.Commit={{ .ShortCommit }}
      -X github.com/josefdolezal/crew/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: crew
    ids:
      - crew
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: checksums.txt

brews:
  - repository:
      owner: josefdolezal
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@users.noreply.github.com
    homepage: "https://github.com/josefdolezal/crew"
    description: "Orchestrate interactive coding-agent sessions (Claude Code, Codex, pi) in tmux"
    license: "MIT"
    dependencies:
      - name: tmux
    test: |
      system "#{bin}/crew", "--version"
    skip_upload: auto

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
