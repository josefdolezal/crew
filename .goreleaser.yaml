version: 2

project_name: crew

builds:
  - id: crew
    main: ./cmd/crew
    binary: crew
    ldflags: >-
      -s -w
      -X github.com/josefdolezal/crew/internal/version.Version={{ .Version }}
      -X github.com/josefdolezal/crew/internal/version.Commit={{ .ShortCommit }}
      -X github.com/josefdolezal/crew/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: crew
    ids:
      - crew
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
