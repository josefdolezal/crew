version: 2

project_name: crew

builds:
  - id: crew
    main: ./cmd/crew
    binary: crew
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/josefdolezal/crew/internal/version.Version={{ .Version }}

archives:
  - id: crew
    ids:
      - crew
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
